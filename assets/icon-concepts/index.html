<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Icon Concepts</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111;
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }
    p {
      margin: 0 0 24px;
      color: #4b5563;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }
    .card {
      background: white;
      border: 1px solid #d9dee5;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }
    img {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      border-radius: 18px;
      background: #eef2f5;
    }
    h2 {
      margin: 14px 0 6px;
      font-size: 18px;
    }
    .note {
      font-size: 14px;
      color: #5b6470;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>App Icon Concepts</h1>
    <p>Preview the selected shield direction and its green variant.</p>
    <div class="grid">
      <div class="card">
        <img src="./icon-concept-3-shield-check.svg" alt="Concept 3" />
        <h2>Selected Icon</h2>
        <div class="note">White version with German flag shield, green check, and the final German labeling.</div>
      </div>
      <div class="card">
        <img src="./icon-concept-3-shield-check-green.svg" alt="Concept 3 Green" />
        <h2>Green Variant</h2>
        <div class="note">Alternate shield version kept for reference.</div>
      </div>
    </div>
  </div>
</body>
</html>
